name: Release SDKs

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bump versions
        run: |
          VERSION="${{ inputs.version }}"

          # Python
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

          # TypeScript
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('typescript/package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('typescript/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Python sdist
        run: |
          cd python
          pip install build
          python -m build --sdist
          mv dist/*.tar.gz dist/teleology-vn-python.tgz

      - name: Build TypeScript package
        run: |
          cd typescript
          npm install
          npm run build
          npm pack
          mv teleology-vn-*.tgz teleology-vn-node.tgz

      - name: Commit version bumps
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add python/pyproject.toml typescript/package.json
          git commit -m "chore: release v${{ inputs.version }}"
          git push

      - name: Tag release
        run: |
          git tag "v${{ inputs.version }}"
          git tag "go/v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}" "go/v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            python/dist/teleology-vn-python.tgz
            typescript/teleology-vn-node.tgz
