openapi: 3.1.0
info:
  description: |
    Read-only API for programmatic access to an organization's secrets.

    ## Authentication
    All requests must include an `Authorization` header with a Bearer API key:
    ```
    Authorization: Bearer vn_org_<key>
    ```
    API keys are created and managed in your org settings → API Keys.
    Keys are scoped to a single organization and provide read-only access.

    ## Key format
    Keys start with `vn_org_` followed by 32 random hex characters.

    ## Rate limiting
    Requests are subject to standard rate limiting. Include exponential backoff
    on `429` responses.
  title: Vault Ninja — Organization SDK API
  version: 1.0.0
servers:
- description: Local dev
  url: http://localhost:8080/api/sdk/v1
- description: Production
  url: https://vaultninja.org/api/sdk/v1
security:
- apiKeyAuth: []
tags:
- description: "Read org secrets, fields, and files"
  name: secrets
paths:
  /secrets:
    get:
      description: |
        Returns all secrets belonging to the org associated with the API key.
        Fields and files are **not** included in the list — fetch them via
        `GET /secrets/{id}` or the individual field/file endpoints.
      operationId: listSecrets
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SecretSummary"
                type: array
          description: OK
        "401":
          $ref: "#/components/responses/Unauthorized"
      summary: List org secrets
      tags:
      - secrets
  /secrets/{id}:
    get:
      description: |
        Returns the full secret object including:
        - All fields with their **decrypted** values
        - All file metadata with SDK download URLs

        The secret must belong to the org that owns the API key.
      operationId: getSecret
      parameters:
      - description: Secret ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Secret"
          description: OK
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Get secret with all decrypted fields and file metadata
      tags:
      - secrets
    parameters:
    - description: Secret ID
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
  /secrets/{id}/fields/{fid}:
    get:
      description: |
        Returns one field with its decrypted value.
        Useful when you only need a specific credential without fetching the
        entire secret (e.g. injecting a password into a CI environment).
      operationId: getField
      parameters:
      - description: Secret ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Field ID
        explode: false
        in: path
        name: fid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretField"
          description: OK
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Get a single decrypted field by ID
      tags:
      - secrets
    parameters:
    - description: Secret ID
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    - description: Field ID
      explode: false
      in: path
      name: fid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
  /secrets/{id}/files/{fid}:
    get:
      description: |
        Streams the raw file bytes. Use the `Content-Disposition` header
        to determine the suggested filename. The `Content-Type` header
        reflects the original file's MIME type.
      operationId: getFile
      parameters:
      - description: Secret ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: File ID
        explode: false
        in: path
        name: fid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: File bytes
          headers:
            Content-Disposition:
              example: attachment; filename="cert.pem"
              explode: false
              schema:
                type: string
              style: simple
            Content-Type:
              example: application/x-pem-file
              explode: false
              schema:
                type: string
              style: simple
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
      summary: Download a file by ID
      tags:
      - secrets
    parameters:
    - description: Secret ID
      explode: false
      in: path
      name: id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    - description: File ID
      explode: false
      in: path
      name: fid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
components:
  responses:
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Missing or invalid API key
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Resource not found or does not belong to this org
  schemas:
    Error:
      example:
        error: invalid or revoked API key
      properties:
        error:
          type: string
    FieldType:
      enum:
      - password
      - card
      - totp
      - url
      - note
      - text
      type: string
    SecretField:
      description: A single field belonging to a secret. The `value` is returned decrypted.
      example:
        id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        secret_id: 1fa85f64-5717-4562-b3fc-2c963f66afa6
        position: 0
        field_type: password
        label: Password
        value: hunter2
        created_at: 2026-01-01T00:00:00Z
      properties:
        id:
          format: uuid
          type: string
        secret_id:
          format: uuid
          type: string
        position:
          type: integer
        field_type:
          $ref: "#/components/schemas/FieldType"
        label:
          type: string
        value:
          description: Decrypted plaintext value
          type: string
        created_at:
          format: date-time
          type: string
      required:
      - created_at
      - field_type
      - id
      - label
      - position
      - secret_id
      - value
    SecretFile:
      description: |
        Metadata for a file attached to a secret.
        Use the `url` field to download the file contents — it points to
        `GET /secrets/{secretId}/files/{fileId}`.
      example:
        secret_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        size_bytes: 0
        content_type: content_type
        original_name: original_name
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        position: 6
        url: https://openapi-generator.tech
      properties:
        id:
          format: uuid
          type: string
        secret_id:
          format: uuid
          type: string
        original_name:
          type: string
        content_type:
          type: string
        size_bytes:
          format: int64
          type: integer
        position:
          type: integer
        created_at:
          format: date-time
          type: string
        url:
          description: SDK download URL for this file
          format: uri
          type: string
      required:
      - content_type
      - created_at
      - id
      - original_name
      - position
      - secret_id
      - size_bytes
      - url
    Secret:
      description: |
        A secret with all its decrypted fields and file metadata.
        Secrets are always scoped to the org that owns the API key.
      example:
        updated_at: 2000-01-23T04:56:07.000+00:00
        org_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        description: description
        created_at: 2000-01-23T04:56:07.000+00:00
        files:
        - secret_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          size_bytes: 0
          content_type: content_type
          original_name: original_name
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          position: 6
          url: https://openapi-generator.tech
        - secret_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          size_bytes: 0
          content_type: content_type
          original_name: original_name
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          position: 6
          url: https://openapi-generator.tech
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        title: title
        fields:
        - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          secret_id: 1fa85f64-5717-4562-b3fc-2c963f66afa6
          position: 0
          field_type: password
          label: Password
          value: hunter2
          created_at: 2026-01-01T00:00:00Z
        - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
          secret_id: 1fa85f64-5717-4562-b3fc-2c963f66afa6
          position: 0
          field_type: password
          label: Password
          value: hunter2
          created_at: 2026-01-01T00:00:00Z
        created_by: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        tags:
        - tags
        - tags
      properties:
        id:
          format: uuid
          type: string
        title:
          type: string
        description:
          type: string
        tags:
          items:
            type: string
          type: array
        org_id:
          format: uuid
          type: string
        created_by:
          format: uuid
          type: string
        created_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
        fields:
          items:
            $ref: "#/components/schemas/SecretField"
          type: array
        files:
          items:
            $ref: "#/components/schemas/SecretFile"
          type: array
      required:
      - created_at
      - created_by
      - description
      - fields
      - files
      - id
      - org_id
      - tags
      - title
      - updated_at
    SecretSummary:
      description: Lightweight secret listing — no fields or files.
      example:
        updated_at: 2000-01-23T04:56:07.000+00:00
        org_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        description: description
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        title: title
        created_by: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        tags:
        - tags
        - tags
      properties:
        id:
          format: uuid
          type: string
        title:
          type: string
        description:
          type: string
        tags:
          items:
            type: string
          type: array
        org_id:
          format: uuid
          type: string
        created_by:
          format: uuid
          type: string
        created_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
      required:
      - created_at
      - created_by
      - description
      - id
      - org_id
      - tags
      - title
      - updated_at
  securitySchemes:
    apiKeyAuth:
      bearerFormat: vn_org_<hex>
      description: Organization API key obtained from org settings → API Keys
      scheme: bearer
      type: http
